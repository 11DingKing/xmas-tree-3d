<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎄 圣诞树手势交互</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #0a0a0a;
        font-family: "Segoe UI", sans-serif;
      }
      #container {
        width: 100vw;
        height: 100vh;
        position: relative;
      }
      .video-container {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 220px;
        height: 165px;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        z-index: 100;
        border: 3px solid rgba(100, 100, 100, 0.3);
        background: #111;
        transition: all 0.3s ease;
      }
      .video-container.tracking {
        border-color: rgba(212, 175, 55, 0.8);
        box-shadow: 0 8px 32px rgba(212, 175, 55, 0.3);
      }
      .video-container video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
      }
      .video-container canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        transform: scaleX(-1);
      }
      .video-status {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #d4af37;
        font-size: 12px;
        text-align: center;
        background: rgba(0, 0, 0, 0.8);
        padding: 10px 16px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .loading-dot {
        width: 8px;
        height: 8px;
        background: #d4af37;
        border-radius: 50%;
        animation: pulse 1s ease-in-out infinite;
      }
      .tracking-indicator {
        position: absolute;
        top: 8px;
        right: 8px;
        font-size: 20px;
        background: rgba(0, 0, 0, 0.6);
        padding: 4px 8px;
        border-radius: 8px;
        transition: all 0.3s ease;
      }
      .tracking-indicator.active {
        background: rgba(212, 175, 55, 0.3);
        animation: pulse 1.5s ease-in-out infinite;
      }
      .upload-container {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 100;
      }
      .upload-btn {
        background: linear-gradient(135deg, #2d5a27 0%, #1a3d15 100%);
        color: #d4af37;
        border: 2px solid #d4af37;
        padding: 12px 24px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
      }
      .upload-btn:hover {
        background: linear-gradient(135deg, #3d7a37 0%, #2a5d25 100%);
        box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
        transform: translateY(-2px);
      }
      .screenshot-btn {
        background: linear-gradient(135deg, #8b0000 0%, #5c0000 100%);
        color: #d4af37;
        border: 2px solid #d4af37;
        padding: 12px 24px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        margin-left: 10px;
      }
      .screenshot-btn:hover {
        background: linear-gradient(135deg, #a50000 0%, #7c0000 100%);
        box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
        transform: translateY(-2px);
      }
      .upload-container input[type="file"] {
        display: none;
      }
      .gesture-info {
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(10, 10, 10, 0.8);
        color: #d4af37;
        padding: 15px 20px;
        border-radius: 10px;
        font-size: 14px;
        border: 1px solid rgba(212, 175, 55, 0.3);
        z-index: 100;
        backdrop-filter: blur(10px);
      }
      .gesture-info h3 {
        margin-bottom: 10px;
        color: #c41e3a;
      }
      .gesture-info p {
        margin: 5px 0;
        opacity: 0.9;
      }
      .gesture-info p.disabled {
        opacity: 0.4;
        font-style: italic;
      }
      .gesture-display {
        position: fixed;
        bottom: 20px;
        left: 20px;
        background: rgba(10, 10, 10, 0.9);
        padding: 16px 24px;
        border-radius: 14px;
        border: 2px solid rgba(212, 175, 55, 0.4);
        z-index: 100;
        min-width: 200px;
        backdrop-filter: blur(10px);
      }
      .gesture-main {
        color: #d4af37;
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .gesture-sub {
        color: rgba(212, 175, 55, 0.7);
        font-size: 13px;
      }
      .enlarged-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.85);
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 200;
        cursor: pointer;
      }
      .enlarged-overlay.visible {
        display: flex;
      }
      .enlarged-photo {
        max-width: 75vw;
        max-height: 75vh;
        border-radius: 16px;
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.8),
          0 0 100px rgba(212, 175, 55, 0.2);
        border: 4px solid #d4af37;
        cursor: default;
      }
      .close-hint {
        margin-top: 20px;
        color: rgba(212, 175, 55, 0.7);
        font-size: 14px;
      }
      .feedback-toast {
        position: fixed;
        top: 80px;
        left: 20px;
        background: rgba(0, 0, 0, 0.9);
        color: #d4af37;
        padding: 12px 20px;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 500;
        border: 1px solid rgba(212, 175, 55, 0.4);
        backdrop-filter: blur(10px);
        z-index: 150;
        pointer-events: none;
        opacity: 0;
        transition: all 0.3s ease;
      }
      .feedback-toast.visible {
        opacity: 1;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.6;
          transform: scale(0.95);
        }
      }
    </style>
  </head>
  <body>
    <div id="container"></div>
    <div id="videoContainer" class="video-container">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
      <div id="videoStatus" class="video-status">
        <div class="loading-dot"></div>
        加载中...
      </div>
      <div id="trackingIndicator" class="tracking-indicator">👀</div>
    </div>
    <div class="upload-container">
      <button
        class="upload-btn"
        onclick="document.getElementById('fileInput').click()"
      >
        📷 上传照片
      </button>
      <button class="screenshot-btn" onclick="takeScreenshot()">📸 截图</button>
      <input type="file" id="fileInput" accept="image/*" multiple />
    </div>
    <div id="gestureInfo" class="gesture-info">
      <h3>🎄 鼠标控制</h3>
      <p>🖱️ 拖拽 → 旋转视角</p>
      <p>👆 点击 → 展开/合拢</p>
      <p>🔄 滚轮 → 缩放</p>
    </div>
    <div class="gesture-display">
      <div id="gestureMain" class="gesture-main">🖱️ 鼠标控制中</div>
      <div id="gestureSub" class="gesture-sub">拖拽旋转 · 点击切换</div>
    </div>
    <div
      id="enlargedOverlay"
      class="enlarged-overlay"
      onclick="closeEnlargedPhoto()"
    >
      <img
        id="enlargedPhoto"
        class="enlarged-photo"
        src=""
        alt="放大照片"
        onclick="event.stopPropagation()"
      />
      <div class="close-hint">握拳关闭 或 点击空白处</div>
    </div>
    <div id="feedbackToast" class="feedback-toast"></div>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
      import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
      import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

      const COLORS = {
        metallicGold: 0xd4af37,
        christmasRed: 0xc41e3a,
        forestGreen: 0x228b22,
        snowWhite: 0xfffafa,
      };
      const TREE_CONFIG = {
        height: 14,
        baseRadius: 5.5,
        sphereCount: 60,
        cubeCount: 25,
        candyCaneCount: 20,
      };

      let scene,
        camera,
        renderer,
        composer,
        animationId = null;
      const particles = [],
        photoTextures = [],
        lights = [];
      let currentState = "collapsed",
        targetState = "collapsed",
        transitionProgress = 1;
      const cameraAngle = { x: 0, y: 0 },
        targetCameraAngle = { x: 0, y: 0 };
      let cameraDistance = 28,
        targetCameraDistance = 28;
      let gestureEnabled = false,
        hasPhotos = false,
        photoEnlarged = false,
        feedbackTimer = null;
      let lastPalmCenter = null,
        rotationVelocity = { x: 0, y: 0 },
        lastHandDepth = null,
        rotationEnabled = false;
      const gestureHistory = { gestures: [], positions: [], maxLength: 5 };
      let stableGesture = "none",
        stableCount = 0;

      const container = document.getElementById("container");
      const videoContainer = document.getElementById("videoContainer");
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const videoStatus = document.getElementById("videoStatus");
      const trackingIndicator = document.getElementById("trackingIndicator");
      const gestureInfo = document.getElementById("gestureInfo");
      const gestureMain = document.getElementById("gestureMain");
      const gestureSub = document.getElementById("gestureSub");
      const enlargedOverlay = document.getElementById("enlargedOverlay");
      const enlargedPhotoEl = document.getElementById("enlargedPhoto");
      const feedbackToast = document.getElementById("feedbackToast");
      const fileInput = document.getElementById("fileInput");

      function showFeedback(msg) {
        feedbackToast.textContent = msg;
        feedbackToast.classList.add("visible");
        if (feedbackTimer) clearTimeout(feedbackTimer);
        feedbackTimer = setTimeout(
          () => feedbackToast.classList.remove("visible"),
          1500,
        );
      }
      function updateGestureDisplay(main, sub) {
        gestureMain.textContent = main;
        gestureSub.textContent = sub;
      }
      function updateGestureInfo() {
        gestureInfo.innerHTML = gestureEnabled
          ? `<h3>🎄 手势控制</h3><p>✊ 握拳 → 合拢圣诞树</p><p>🖐️ 张开 → 散开 + 旋转</p><p class="${hasPhotos ? "" : "disabled"}">👌 捏合 → ${hasPhotos ? "查看照片" : "上传照片后可用"}</p><p>↔️ 前后 → 缩放视角</p>`
          : `<h3>🎄 鼠标控制</h3><p>🖱️ 拖拽 → 旋转视角</p><p>👆 点击 → 展开/合拢</p><p>🔄 滚轮 → 缩放</p>`;
      }
      window.closeEnlargedPhoto = function () {
        photoEnlarged = false;
        enlargedOverlay.classList.remove("visible");
        setTargetState("scattered");
      };

      function initScene() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020208);
        scene.fog = new THREE.FogExp2(0x020208, 0.008);
        camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          1000,
        );
        camera.position.set(0, 10, -28);
        camera.lookAt(0, 7, 0);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.8;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);
        setupPostProcessing();
        setupLights();
        createSnowParticles();
        createTreeTrunk();
        createTreeLayers();
        createChristmasTreeElements();
        createTreeTopper();
        createGround();
        createAuroraBackground();
        createMoon();
        window.addEventListener("resize", onWindowResize);
      }

      function setupPostProcessing() {
        composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(
          new THREE.Vector2(window.innerWidth, window.innerHeight),
          1.0,
          0.4,
          0.85,
        );
        bloomPass.threshold = 0.5;
        bloomPass.strength = 0.8;
        bloomPass.radius = 0.5;
        composer.addPass(bloomPass);
      }

      function setupLights() {
        scene.add(new THREE.AmbientLight(0x1a1a3e, 0.5));
        const moonLight = new THREE.DirectionalLight(0xaabbff, 0.8);
        moonLight.position.set(-30, 40, -20);
        moonLight.castShadow = true;
        moonLight.shadow.mapSize.width = 2048;
        moonLight.shadow.mapSize.height = 2048;
        scene.add(moonLight);
        const goldLight = new THREE.PointLight(COLORS.metallicGold, 4, 80);
        goldLight.position.set(0, 16, 0);
        scene.add(goldLight);
        lights.push({ light: goldLight, baseIntensity: 4 });
        const redLight = new THREE.PointLight(COLORS.christmasRed, 3, 50);
        redLight.position.set(-10, 8, 10);
        scene.add(redLight);
        lights.push({ light: redLight, baseIntensity: 3 });
        const greenLight = new THREE.PointLight(0x00ff66, 2.5, 45);
        greenLight.position.set(10, 5, -8);
        scene.add(greenLight);
        lights.push({ light: greenLight, baseIntensity: 2.5 });
        const blueLight = new THREE.PointLight(0x4488ff, 2, 40);
        blueLight.position.set(0, 3, 12);
        scene.add(blueLight);
        lights.push({ light: blueLight, baseIntensity: 2 });
        const warmLight = new THREE.PointLight(0xffaa44, 2, 35);
        warmLight.position.set(-5, 10, 5);
        scene.add(warmLight);
        lights.push({ light: warmLight, baseIntensity: 2 });
      }

      function createMoon() {
        const moonGroup = new THREE.Group();
        const moonGeo = new THREE.SphereGeometry(4, 64, 64);
        const moonMat = new THREE.MeshBasicMaterial({ color: 0xffffee });
        const moon = new THREE.Mesh(moonGeo, moonMat);
        moonGroup.add(moon);
        [5, 6.5].forEach((size, i) => {
          const glow = new THREE.Mesh(
            new THREE.SphereGeometry(size, 32, 32),
            new THREE.MeshBasicMaterial({
              color: 0xffffcc,
              transparent: true,
              opacity: 0.08 - i * 0.03,
              blending: THREE.AdditiveBlending,
            }),
          );
          moonGroup.add(glow);
        });
        moonGroup.position.set(25, 40, -50);
        scene.add(moonGroup);
      }

      function createSnowParticles() {
        const snowGeometry = new THREE.BufferGeometry();
        const snowCount = 3000,
          positions = new Float32Array(snowCount * 3),
          velocities = [];
        for (let i = 0; i < snowCount; i++) {
          positions[i * 3] = (Math.random() - 0.5) * 120;
          positions[i * 3 + 1] = Math.random() * 60;
          positions[i * 3 + 2] = (Math.random() - 0.5) * 120;
          velocities.push({
            y: 0.015 + Math.random() * 0.025,
            x: (Math.random() - 0.5) * 0.008,
            wobble: Math.random() * Math.PI * 2,
          });
        }
        snowGeometry.setAttribute(
          "position",
          new THREE.BufferAttribute(positions, 3),
        );
        const snowMaterial = new THREE.PointsMaterial({
          color: 0xffffff,
          size: 0.12,
          transparent: true,
          opacity: 0.9,
          blending: THREE.AdditiveBlending,
        });
        const snow = new THREE.Points(snowGeometry, snowMaterial);
        snow.userData = { type: "snow", velocities };
        scene.add(snow);
        particles.push(snow);
      }

      function createTreeTrunk() {
        const trunkGroup = new THREE.Group();
        const trunk = new THREE.Mesh(
          new THREE.CylinderGeometry(0.6, 1.0, 2.5, 16),
          new THREE.MeshStandardMaterial({
            color: 0x5d4037,
            roughness: 0.95,
            metalness: 0.05,
          }),
        );
        trunk.position.y = -0.75;
        trunk.castShadow = true;
        trunkGroup.add(trunk);
        for (let i = 0; i < 8; i++) {
          const root = new THREE.Mesh(
            new THREE.CylinderGeometry(0.08, 0.15, 1.5, 8),
            new THREE.MeshStandardMaterial({ color: 0x4a3728, roughness: 0.9 }),
          );
          const angle = (i / 8) * Math.PI * 2;
          root.position.set(Math.cos(angle) * 0.8, -1.5, Math.sin(angle) * 0.8);
          root.rotation.z = Math.cos(angle) * 0.4;
          root.rotation.x = Math.sin(angle) * 0.4;
          trunkGroup.add(root);
        }
        trunkGroup.userData = {
          type: "trunk",
          collapsedPos: new THREE.Vector3(0, 0, 0),
          scatteredPos: new THREE.Vector3(0, 0, 0),
          rotationSpeed: new THREE.Vector3(0, 0, 0),
        };
        scene.add(trunkGroup);
      }

      function createTreeLayers() {
        const layerConfigs = [
          { y: 1.5, radius: 5.0, height: 4.5 },
          { y: 4.8, radius: 4.0, height: 4.0 },
          { y: 7.8, radius: 3.0, height: 3.5 },
          { y: 10.3, radius: 2.0, height: 3.0 },
          { y: 12.3, radius: 1.2, height: 2.5 },
          { y: 13.8, radius: 0.6, height: 1.8 },
        ];
        layerConfigs.forEach((config, index) => {
          const coneGroup = new THREE.Group();
          const mainCone = new THREE.Mesh(
            new THREE.ConeGeometry(config.radius, config.height, 48),
            new THREE.MeshStandardMaterial({
              color: new THREE.Color().setHSL(0.33, 0.75, 0.12 + index * 0.02),
              roughness: 0.85,
              metalness: 0.05,
              emissive: new THREE.Color(0x002200),
              emissiveIntensity: 0.15,
            }),
          );
          mainCone.castShadow = true;
          mainCone.receiveShadow = true;
          coneGroup.add(mainCone);
          const snowCap = new THREE.Mesh(
            new THREE.ConeGeometry(
              config.radius * 0.95,
              config.height * 0.15,
              48,
            ),
            new THREE.MeshStandardMaterial({
              color: 0xffffff,
              roughness: 0.9,
              metalness: 0.1,
              emissive: 0x222222,
              emissiveIntensity: 0.1,
            }),
          );
          snowCap.position.y = config.height * 0.42;
          coneGroup.add(snowCap);
          for (let i = 0; i < 12; i++) {
            const branchAngle = (i / 12) * Math.PI * 2 + index * 0.3;
            const branchLen = config.radius * 0.4;
            const branch = new THREE.Mesh(
              new THREE.ConeGeometry(0.15, branchLen, 8),
              new THREE.MeshStandardMaterial({
                color: 0x1a4d1a,
                roughness: 0.8,
              }),
            );
            branch.position.set(
              Math.cos(branchAngle) * config.radius * 0.85,
              -config.height * 0.3,
              Math.sin(branchAngle) * config.radius * 0.85,
            );
            branch.rotation.z = Math.cos(branchAngle) * 0.8;
            branch.rotation.x = Math.sin(branchAngle) * 0.8;
            coneGroup.add(branch);
          }
          coneGroup.position.y = config.y;
          coneGroup.userData = {
            type: "treeLayer",
            collapsedPos: new THREE.Vector3(0, config.y, 0),
            scatteredPos: new THREE.Vector3(
              (Math.random() - 0.5) * 18,
              config.y + Math.random() * 6,
              (Math.random() - 0.5) * 18,
            ),
            rotationSpeed: new THREE.Vector3(0, 0.003, 0),
          };
          scene.add(coneGroup);
          particles.push(coneGroup);
        });
      }

      function createChristmasTreeElements() {
        const { height, baseRadius, sphereCount, cubeCount, candyCaneCount } =
          TREE_CONFIG;
        // 彩色灯泡串
        for (let i = 0; i < sphereCount; i++) {
          const size = 0.12 + Math.random() * 0.12;
          const hue = [0, 0.1, 0.3, 0.55, 0.75, 0.85][
            Math.floor(Math.random() * 6)
          ];
          const color = new THREE.Color().setHSL(hue, 1, 0.55);
          const bulb = new THREE.Mesh(
            new THREE.SphereGeometry(size, 16, 16),
            new THREE.MeshStandardMaterial({
              color,
              metalness: 0.4,
              roughness: 0.15,
              emissive: color,
              emissiveIntensity: 0.6,
            }),
          );
          setupParticlePosition(bulb, "bulb", height, baseRadius * 0.88);
          bulb.userData.hue = hue;
          bulb.userData.pulseOffset = Math.random() * Math.PI * 2;
          bulb.userData.pulseSpeed = 2 + Math.random() * 2;
          scene.add(bulb);
          particles.push(bulb);
        }
        // 大装饰球
        for (let i = 0; i < 35; i++) {
          const size = 0.3 + Math.random() * 0.25;
          const type = Math.random();
          let color, metalness, roughness;
          if (type < 0.35) {
            color = COLORS.metallicGold;
            metalness = 0.98;
            roughness = 0.02;
          } else if (type < 0.65) {
            color = COLORS.christmasRed;
            metalness = 0.5;
            roughness = 0.25;
          } else if (type < 0.85) {
            color = 0x4169e1;
            metalness = 0.7;
            roughness = 0.15;
          } else {
            color = 0xc0c0c0;
            metalness = 0.95;
            roughness = 0.05;
          }
          const ornament = new THREE.Mesh(
            new THREE.SphereGeometry(size, 32, 32),
            new THREE.MeshStandardMaterial({
              color,
              metalness,
              roughness,
              emissive: color,
              emissiveIntensity: 0.2,
              envMapIntensity: 2,
            }),
          );
          const cap = new THREE.Mesh(
            new THREE.CylinderGeometry(
              size * 0.25,
              size * 0.35,
              size * 0.2,
              12,
            ),
            new THREE.MeshStandardMaterial({
              color: COLORS.metallicGold,
              metalness: 0.9,
              roughness: 0.1,
            }),
          );
          cap.position.y = size * 0.95;
          ornament.add(cap);
          setupParticlePosition(
            ornament,
            "ornament",
            height,
            baseRadius * 0.92,
          );
          scene.add(ornament);
          particles.push(ornament);
        }
        // 礼物盒
        for (let i = 0; i < cubeCount; i++) {

          innerRadius = 0.4,

        for (let i = 0; i < spikes * 2; i++) {
          const radius = i % 2 === 0 ? outerRadius : innerRadius;
          const angle = (i * Math.PI) / spikes - Math.PI / 2;
          i === 0
            ? starShape.moveTo(
                Math.cos(angle) * radius,
                Math.sin(angle) * radius,
              )
            : starShape.lineTo(
                Math.cos(angle) * radius,
                Math.sin(angle) * radius,
              );
        }
        starShape.closePath();
        const starGeo = new THREE.ExtrudeGeometry(starShape, {
          depth: 0.25,
          bevelEnabled: true,
          bevelThickness: 0.06,
          bevelSize: 0.06,
          bevelSegments: 3,
        });
        const starMat = new THREE.MeshStandardMaterial({
          color: COLORS.metallicGold,
          metalness: 1,
          roughness: 0.05,
          emissive: COLORS.metallicGold,
          emissiveIntensity: 0.5,

        const star = new THREE.Mesh(starGeo, starMat);
        star.rotation.x = Math.PI / 2;

      function addPhotoToScene(imageUrl, index) {

            height = width / aspect;
          const photo = new THREE.Mesh(
            new THREE.PlaneGeometry(width, height),
            new THREE.MeshStandardMaterial({
              map: texture,
              side: THREE.DoubleSide,
              metalness: 0,
              roughness: 1,
              toneMapped: true,
            }),
          );
          photo.layers.set(0);
          const frameW = 0.15;
          const frame = new THREE.Mesh(
            new THREE.BoxGeometry(width + frameW * 2, height + frameW * 2, 0.1),
            new THREE.MeshStandardMaterial({
              color: COLORS.metallicGold,
              metalness: 0.85,
              roughness: 0.15,
              emissive: COLORS.metallicGold,
              emissiveIntensity: 0.15,
            }),

          frame.position.z = -0.06;
          photo.add(frame);
          const existing = photoTextures.length;
          const angle = existing * 1.6 + Math.random() * 0.4;

            Math.sin(angle) * radius,

          photo.userData = {

              (Math.random() - 0.5) * 0.005,
              0,
            ),
          };
          photo.position.copy(
            currentState === "collapsed" ? collapsedPos : scatteredPos,

          scene.add(photo);

      function setTargetState(state) {
        if (targetState !== state) {
          targetState = state;
          transitionProgress = 0;
        }
      }
      function getCurrentState() {
        return currentState;
      }
      function updateCameraAngle(deltaX, deltaY) {
        targetCameraAngle.x += deltaX;
        targetCameraAngle.y = Math.max(
          -0.8,
          Math.min(0.8, targetCameraAngle.y + deltaY),
        );
      }
      function setZoom(delta) {
        targetCameraDistance = Math.max(
          14,
          Math.min(50, targetCameraDistance + delta),
        );
      }
      function findNearestPhoto(palmCenter) {
        let nearest = null,
          minDist = Infinity;
        for (const pd of photoTextures) {
          const screenPos = pd.mesh.position.clone().project(camera);
          const dist = Math.sqrt(
            Math.pow((screenPos.x + 1) / 2 - (1 - palmCenter.x), 2) +
              Math.pow((1 - screenPos.y) / 2 - palmCenter.y, 2),
          );
          if (dist < minDist && dist < 0.5) {
            minDist = dist;
            nearest = pd.mesh;
          }
        }
        return nearest;
      }
      function findPhotoAtScreenPos(screenX, screenY) {
        const mouse = new THREE.Vector2(
          (screenX / window.innerWidth) * 2 - 1,
          -(screenY / window.innerHeight) * 2 + 1,
        );
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);
        const photoMeshes = photoTextures.map((p) => p.mesh);
        const intersects = raycaster.intersectObjects(photoMeshes, true);
        if (intersects.length > 0) {
          let obj = intersects[0].object;
          while (obj.parent && !obj.userData.type) obj = obj.parent;
          if (obj.userData.type === "photo") return obj;
        }
        return null;
      }
      function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }

      function animate() {
        animationId = requestAnimationFrame(animate);
        const time = Date.now() * 0.001;
        if (transitionProgress < 1)
          transitionProgress = Math.min(transitionProgress + 0.018, 1);
        if (transitionProgress >= 1 && currentState !== targetState)
          currentState = targetState;
        cameraAngle.x += (targetCameraAngle.x - cameraAngle.x) * 0.1;
        cameraAngle.y += (targetCameraAngle.y - cameraAngle.y) * 0.1;
        cameraDistance += (targetCameraDistance - cameraDistance) * 0.1;
        camera.position.x = Math.sin(cameraAngle.x) * cameraDistance;
        camera.position.z = -Math.cos(cameraAngle.x) * cameraDistance;
        camera.position.y = 10 + cameraAngle.y * 12;
        camera.lookAt(0, 7, 0);
        lights.forEach((item, i) => {
          item.light.intensity =
            item.baseIntensity * (0.75 + Math.sin(time * 2.5 + i * 1.2) * 0.25);
        });
        for (const particle of particles) {
          const ud = particle.userData;
          if (!ud) continue;
          if (ud.type === "snow") {
            const pos = particle.geometry.attributes.position.array;
            for (let i = 0; i < pos.length / 3; i++) {
              pos[i * 3 + 1] -= ud.velocities[i].y;
              pos[i * 3] +=
                ud.velocities[i].x +
                Math.sin(time * 0.8 + ud.velocities[i].wobble + i * 0.1) *
                  0.003;
              if (pos[i * 3 + 1] < -1) {
                pos[i * 3 + 1] = 60;
                pos[i * 3] = (Math.random() - 0.5) * 120;
                pos[i * 3 + 2] = (Math.random() - 0.5) * 120;
              }
            }
            particle.geometry.attributes.position.needsUpdate = true;
            continue;
          }
          if (ud.type === "stars") continue;
          if (ud.type === "bulb" && particle.material) {
            const pulse =
              Math.sin(time * ud.pulseSpeed + ud.pulseOffset) * 0.5 + 0.5;
            particle.material.emissiveIntensity = 0.4 + pulse * 0.4;
          }
          const easeP = easeInOutCubic(transitionProgress);
          if (ud.collapsedPos && ud.scatteredPos) {
            if (currentState === "collapsed" && targetState === "scattered")
              particle.position.lerpVectors(
                ud.collapsedPos,
                ud.scatteredPos,
                easeP,
              );
            else if (
              currentState === "scattered" &&
              targetState === "collapsed"
            )
              particle.position.lerpVectors(
                ud.scatteredPos,
                ud.collapsedPos,
                easeP,
              );
            else if (
              targetState === "scattered" ||
              targetState === "photoEnlarged"
            ) {
              particle.position.x =
                ud.scatteredPos.x +
                Math.sin(time * 0.5 + ud.scatteredPos.x) * 0.9;
              particle.position.y =
                ud.scatteredPos.y +
                Math.sin(time * 0.4 + ud.scatteredPos.y) * 0.6;
              particle.position.z =
                ud.scatteredPos.z +
                Math.cos(time * 0.6 + ud.scatteredPos.z) * 0.9;
            }
          }
          if (ud.rotationSpeed) {
            particle.rotation.x += ud.rotationSpeed.x;
            particle.rotation.y += ud.rotationSpeed.y;
            particle.rotation.z += ud.rotationSpeed.z;
          }
          if (ud.type === "photo") particle.lookAt(camera.position);
        }
        composer.render();
      }

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
      }

      // 手势识别
      function dist(p1, p2) {
        return Math.sqrt((p1.x - p2.x) ** 2 + (p1.y - p2.y) ** 2);
      }
      function getPalmCenter(lm) {
        const pts = [0, 5, 9, 13, 17];
        const sum = pts.reduce(
          (a, i) => ({ x: a.x + lm[i].x, y: a.y + lm[i].y }),
          { x: 0, y: 0 },
        );
        return { x: sum.x / pts.length, y: sum.y / pts.length };
      }
      function getPalmSize(lm) {
        return dist(lm[0], lm[9]);
      }
      function isFingerExtended(lm, tip, pip) {
        return lm[tip].y < lm[pip].y - 0.03;
      }
      function getExtendedFingerCount(lm) {
        const ps = getPalmSize(lm);
        let c = 0;
        if (dist(lm[4], lm[5]) / ps > 0.6) c++;
        if (isFingerExtended(lm, 8, 6)) c++;
        if (isFingerExtended(lm, 12, 10)) c++;
        if (isFingerExtended(lm, 16, 14)) c++;
        if (isFingerExtended(lm, 20, 18)) c++;
        return c;
      }
      function getPinchDistance(lm) {
        return dist(lm[4], lm[8]) / getPalmSize(lm);
      }
      function getHandDepth(lm) {
        return Math.min(1, Math.max(0, (getPalmSize(lm) - 0.08) / 0.25));
      }
      function recognizeGesture(lm) {
        const ec = getExtendedFingerCount(lm),
          pd = getPinchDistance(lm);
        if (ec <= 1) return "fist";
        if (ec >= 4) return "open";
        if (pd < 0.4) return "grab";
        return "rotate";
      }
      function smoothPosition(newPos) {
        gestureHistory.positions.push({ ...newPos });
        if (gestureHistory.positions.length > gestureHistory.maxLength)
          gestureHistory.positions.shift();
        if (gestureHistory.positions.length < 2) return newPos;
        let x = 0,
          y = 0,
          w = 0;
        gestureHistory.positions.forEach((p, i) => {
          const wt = i + 1;
          x += p.x * wt;
          y += p.y * wt;
          w += wt;
        });
        return { x: x / w, y: y / w };
      }
      function getVelocity() {
        if (gestureHistory.positions.length < 2) return { x: 0, y: 0 };
        const l = gestureHistory.positions.length,
          c = gestureHistory.positions[l - 1],
          p = gestureHistory.positions[l - 2];
        return { x: (c.x - p.x) * 30, y: (c.y - p.y) * 30 };
      }
      function processGesture(landmarks) {
        if (!landmarks || landmarks.length < 21) return null;
        const gesture = recognizeGesture(landmarks);
        gestureHistory.gestures.push(gesture);
        if (gestureHistory.gestures.length > gestureHistory.maxLength)
          gestureHistory.gestures.shift();
        const counts = {};
        gestureHistory.gestures.forEach((g) => {
          counts[g] = (counts[g] || 0) + 1;
        });
        let dominant = "none",
          maxCount = 0;
        for (const [g, c] of Object.entries(counts)) {
          if (c > maxCount) {
            maxCount = c;
            dominant = g;
          }
        }
        if (dominant === stableGesture)
          stableCount = Math.min(stableCount + 1, 10);
        else if (maxCount >= 3) {
          stableGesture = dominant;
          stableCount = maxCount;
        }
        const rawPalm = getPalmCenter(landmarks),
          palmCenter = smoothPosition(rawPalm),
          velocity = getVelocity();
        if (stableCount >= 3)
          return {
            gesture: stableGesture,
            palmCenter,
            velocity,
            pinchDistance: getPinchDistance(landmarks),
            handDepth: getHandDepth(landmarks),
          };
        return null;
      }
      function resetGesture() {
        stableGesture = "none";
        stableCount = 0;
        gestureHistory.gestures = [];
        gestureHistory.positions = [];
      }

      function handleGesture({ gesture, palmCenter, velocity, handDepth }) {
        const state = getCurrentState();
        if (lastHandDepth !== null && gesture !== "fist") {
          const dd = (handDepth - lastHandDepth) * 50;
          if (Math.abs(dd) > 0.2) setZoom(-dd);
        }
        lastHandDepth = handDepth;
        switch (gesture) {
          case "fist":
            updateGestureDisplay(
              "✊ 握拳",
              photoEnlarged
                ? "关闭照片"
                : state !== "collapsed"
                  ? "合拢圣诞树"
                  : "已合拢",
            );
            if (photoEnlarged) {
              photoEnlarged = false;
              enlargedOverlay.classList.remove("visible");
              setTargetState("scattered");
              showFeedback("📷 关闭照片");
            } else if (state !== "collapsed") {
              setTargetState("collapsed");
              showFeedback("🎄 圣诞树合拢中...");
            }
            lastPalmCenter = null;
            lastHandDepth = null;
            rotationEnabled = false;
            break;
          case "open":
            updateGestureDisplay(
              "🖐️ 张开五指",
              state === "collapsed" ? "散开元素" : "左右移动旋转",
            );
            if (state === "collapsed") {
              setTargetState("scattered");
              showFeedback("✨ 元素散开中...");
              lastPalmCenter = { ...palmCenter };
              rotationEnabled = false;
            } else {
              if (
                !rotationEnabled &&
                lastPalmCenter &&
                Math.abs(palmCenter.x - lastPalmCenter.x) +
                  Math.abs(palmCenter.y - lastPalmCenter.y) <
                  0.05
              )
                rotationEnabled = true;
              if (rotationEnabled && lastPalmCenter) {
                const dx = (palmCenter.x - lastPalmCenter.x) * 8,
                  dy = (palmCenter.y - lastPalmCenter.y) * 5;
                const speed = Math.sqrt(
                    velocity.x * velocity.x + velocity.y * velocity.y,
                  ),
                  boost = 1 + Math.min(speed, 1.5) * 0.5;
                rotationVelocity.x = rotationVelocity.x * 0.6 + dx * boost;
                rotationVelocity.y = rotationVelocity.y * 0.6 + dy * boost;
                if (
                  Math.abs(rotationVelocity.x) > 0.005 ||
                  Math.abs(rotationVelocity.y) > 0.005
                )
                  updateCameraAngle(
                    rotationVelocity.x * 0.2,
                    rotationVelocity.y * 0.15,
                  );
              }
            }
            lastPalmCenter = { ...palmCenter };
            break;
          case "rotate":
            updateGestureDisplay("✌️ 旋转", "移动旋转视角");
            if (lastPalmCenter) {
              updateCameraAngle(
                (palmCenter.x - lastPalmCenter.x) * 6,
                (palmCenter.y - lastPalmCenter.y) * 4,
              );
            }
            lastPalmCenter = { ...palmCenter };
            rotationEnabled = true;
            break;
          case "grab":
            if (!hasPhotos) {
              updateGestureDisplay("✌️ 旋转", "移动旋转视角");
              if (lastPalmCenter)
                updateCameraAngle(
                  (palmCenter.x - lastPalmCenter.x) * 6,
                  (palmCenter.y - lastPalmCenter.y) * 4,
                );
              lastPalmCenter = { ...palmCenter };
              break;
            }
            updateGestureDisplay(
              "👌 捏合",
              state === "scattered" || state === "photoEnlarged"
                ? "选择照片查看"
                : "先张开手散开元素",
            );
            if (state === "scattered" || state === "photoEnlarged") {
              const np = findNearestPhoto(palmCenter);
              if (np && !photoEnlarged) {
                enlargedPhotoEl.src = np.userData.imageUrl;
                photoEnlarged = true;
                enlargedOverlay.classList.add("visible");
                setTargetState("photoEnlarged");
                showFeedback("📷 查看照片");
              }
            }
            lastPalmCenter = { ...palmCenter };
            rotationEnabled = false;
            break;
          default:
            updateGestureDisplay("✋ 识别中...", "保持手势稳定");
            rotationEnabled = false;
        }
      }
      function handleHandLost() {
        updateGestureDisplay("✋ 等待手势", "将手放入摄像头范围");
        lastPalmCenter = null;
        lastHandDepth = null;
        rotationVelocity = { x: 0, y: 0 };
        rotationEnabled = false;
        feedbackToast.classList.remove("visible");
        if (feedbackTimer) clearTimeout(feedbackTimer);
      }

      let hands = null,
        mpAnimationId = null,
        stream = null,
        lostFrameCount = 0;
      async function initMediaPipe() {
        const ctx = canvas.getContext("2d");
        try {
          stream = await Promise.race([
            navigator.mediaDevices.getUserMedia({
              video: { width: 640, height: 480, facingMode: "user" },
            }),
            new Promise((_, r) =>
              setTimeout(() => r(new Error("摄像头请求超时")), 8000),
            ),
          ]);
          video.srcObject = stream;
          await new Promise((res, rej) => {
            video.onloadedmetadata = res;
            setTimeout(() => rej(new Error("视频加载超时")), 5000);
          });
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          await new Promise((res, rej) => {
            const s1 = document.createElement("script");
            s1.src =
              "https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js";
            s1.onload = () => {
              const s2 = document.createElement("script");
              s2.src =
                "https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js";
              s2.onload = res;
              s2.onerror = rej;
              document.head.appendChild(s2);
            };
            s1.onerror = rej;
            document.head.appendChild(s1);
          });
          hands = new window.Hands({
            locateFile: (f) =>
              `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`,
          });
          hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.6,
          });
          hands.onResults((results) => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (results.multiHandLandmarks?.length > 0) {
              lostFrameCount = 0;
              videoContainer.classList.add("tracking");
              trackingIndicator.textContent = "🖐️";
              trackingIndicator.classList.add("active");
              const lm = results.multiHandLandmarks[0];
              window.drawConnectors(ctx, lm, window.HAND_CONNECTIONS, {
                color: "#d4af37",
                lineWidth: 3,
              });
              lm.forEach((p, i) => {
                const x = p.x * canvas.width,
                  y = p.y * canvas.height;
                ctx.beginPath();
                ctx.arc(x, y, 8, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(212, 175, 55, 0.3)";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fillStyle = i < 5 ? "#c41e3a" : "#d4af37";
                ctx.fill();
              });
              const gr = processGesture(lm);
              if (gr) handleGesture(gr);
            } else {
              lostFrameCount++;
              if (lostFrameCount > 15) {
                videoContainer.classList.remove("tracking");
                trackingIndicator.textContent = "👀";
                trackingIndicator.classList.remove("active");
                resetGesture();
                handleHandLost();
              }
            }
          });
          await hands.initialize();
          videoStatus.style.display = "none";
          gestureEnabled = true;
          updateGestureDisplay("✋ 等待手势", "将手放入摄像头范围");
          updateGestureInfo();
          showFeedback("🎉 手势识别已启用");
          async function detect() {
            if (hands && video.readyState >= 2)
              await hands.send({ image: video });
            mpAnimationId = requestAnimationFrame(detect);
          }
          detect();
        } catch (e) {
          console.error("手势识别初始化失败:", e);
          videoStatus.innerHTML = "❌ " + e.message;
          gestureEnabled = false;
          updateGestureInfo();
        }
      }

      let isDragging = false,
        lastX = 0,
        lastY = 0,
        dragDistance = 0;
      function onMouseDown(e) {
        if (
          e.target.closest(
            "button, input, .video-container, .gesture-info, .enlarged-overlay, .upload-container",
          )
        )
          return;
        isDragging = true;
        dragDistance = 0;
        lastX = e.clientX;
        lastY = e.clientY;
      }
      function onMouseMove(e) {
        if (!isDragging) return;
        const dx = e.clientX - lastX,
          dy = e.clientY - lastY;
        dragDistance += Math.abs(dx) + Math.abs(dy);
        lastX = e.clientX;
        lastY = e.clientY;
        updateCameraAngle(dx * 0.008, dy * 0.008);
      }
      function onMouseUp(e) {
        if (
          isDragging &&
          dragDistance < 5 &&
          !e.target.closest(
            "button, input, .video-container, .gesture-info, .enlarged-overlay, .upload-container",
          )
        ) {
          const s = getCurrentState();
          if (s === "scattered" || s === "photoEnlarged") {
            const clickedPhoto = findPhotoAtScreenPos(e.clientX, e.clientY);
            if (clickedPhoto && hasPhotos) {
              enlargedPhotoEl.src = clickedPhoto.userData.imageUrl;
              photoEnlarged = true;
              enlargedOverlay.classList.add("visible");
              setTargetState("photoEnlarged");
              showFeedback("📷 查看照片");
              isDragging = false;
              return;
            }
          }
          if (s === "collapsed") {
            setTargetState("scattered");
            showFeedback("✨ 元素散开");
          } else {
            setTargetState("collapsed");
            photoEnlarged = false;
            enlargedOverlay.classList.remove("visible");
            showFeedback("🎄 圣诞树合拢");
          }
        }
        isDragging = false;
      }
      function onWheel(e) {
        if (
          e.target.closest(".video-container, .gesture-info, .upload-container")
        )
          return;
        e.preventDefault();
        setZoom(e.deltaY * 0.01);
      }

      window.takeScreenshot = function () {
        const dataURL = renderer.domElement.toDataURL("image/png");
        const link = document.createElement("a");
        link.download = `xmas-tree-${Date.now()}.png`;
        link.href = dataURL;
        link.click();
        showFeedback("📸 截图已保存");
      };

      fileInput.addEventListener("change", (e) => {
        const files = Array.from(e.target.files).filter((f) =>
          f.type.startsWith("image/"),
        );
        if (files.length) {
          files.forEach((f, i) => {
            const r = new FileReader();
            r.onload = (ev) => addPhotoToScene(ev.target.result, i);
            r.readAsDataURL(f);
          });
          hasPhotos = true;
          updateGestureInfo();
          showFeedback(`📷 已添加 ${files.length} 张照片`);
        }
      });

      window.addEventListener("mousedown", onMouseDown);
      window.addEventListener("mousemove", onMouseMove);
      window.addEventListener("mouseup", onMouseUp);
      window.addEventListener("wheel", onWheel, { passive: false });
      initScene();
      animate();
      initMediaPipe();
    </script>
  </body>
</html>
